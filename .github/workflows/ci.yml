# CI ALGO — gate alignée sur `npm run verify:release` (voir `config/algo-qa-gate.ts`).
# Pipeline global GitHub + Vercel + Husky : `docs/ALGO_CICD_PIPELINE.md`.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      # Aligné sur `config/algo-deploy-gate.ts` · même gate que `npm run verify:release` (local).
      - name: Pre-deploy gate (verify release)
        run: npm run verify:release
